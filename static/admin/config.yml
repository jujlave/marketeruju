backend:
  name: github
  repo: jujlave/marketeruju
  branch: main
  # Cloudflare Worker OAuth endpoint
  base_url: https://cms-auth.marketeruju.com
  auth_endpoint: auth
  site_id: marketeruju.com
  auth_scope: repo

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

site_url: "https://marketeruju.com"
display_url: "https://marketeruju.com"

collections:
  - name: "home"
    label: "Home Page"
    editor:
      preview: false
    files:
      - name: "main-home"
        label: "Main Page Layout"
        file: "content/_index.md"
        fields:
          - { name: "title", label: "SEO Title", widget: "string" }
          - { name: "description", label: "SEO Description", widget: "text" }
          - name: "hero"
            label: "Hero Section"
            widget: "object"
            collapsed: false
            fields:
              - { name: "kicker", label: "Small Label", widget: "string", required: false }
              - { name: "title", label: "Hero Title", widget: "string", hint: "줄바꿈이 필요하면 <br>을 사용할 수 있습니다." }
              - { name: "subtitle", label: "Subtitle", widget: "text", required: false }
              - name: "primaryButton"
                label: "Primary Button"
                widget: "object"
                collapsed: true
                fields:
                  - { name: "label", label: "Label", widget: "string" }
                  - { name: "url", label: "URL", widget: "string" }
              - name: "secondaryButton"
                label: "Secondary Button"
                widget: "object"
                collapsed: true
                fields:
                  - { name: "label", label: "Label", widget: "string" }
                  - { name: "url", label: "URL", widget: "string" }
              - name: "highlights"
                label: "Hero Highlights"
                widget: "list"
                summary: "{{fields.number}} · {{fields.label}}"
                min: 1
                max: 4
                fields:
                  - { name: "number", label: "Number", widget: "string", default: "01" }
                  - { name: "label", label: "Label", widget: "string" }
          - name: "latest"
            label: "Latest Post Card"
            widget: "object"
            collapsed: true
            fields:
              - { name: "label", label: "Label", widget: "string", required: false }
              - { name: "cta", label: "CTA Text", widget: "string", required: false }
              - { name: "emptyLabel", label: "Empty Label", widget: "string", required: false }
              - { name: "emptyTitle", label: "Empty Title", widget: "string", required: false }
              - { name: "emptyText", label: "Empty Text", widget: "text", required: false }
          - name: "sections"
            label: "Content Sections"
            widget: "object"
            collapsed: true
            fields:
              - { name: "contentTitle", label: "Main Content Title", widget: "string" }
              - { name: "seoNoteTitle", label: "SEO Note Group Title", widget: "string" }
              - { name: "seoNoteMoreLabel", label: "SEO Note More Label", widget: "string" }
              - { name: "aeoGeoTitle", label: "AEO-GEO Group Title", widget: "string" }
              - { name: "aeoGeoMoreLabel", label: "AEO-GEO More Label", widget: "string" }
              - { name: "emptySeoNote", label: "SEO Note Empty Text", widget: "string", required: false }
              - { name: "emptyAeoGeoNote", label: "AEO-GEO Empty Text", widget: "string", required: false }
          - name: "quickAccess"
            label: "Quick Access Section"
            widget: "object"
            collapsed: true
            fields:
              - { name: "kicker", label: "Small Label", widget: "string", required: false }
              - { name: "title", label: "Section Title", widget: "string" }
              - { name: "recentTitle", label: "Recent Posts Title", widget: "string" }
              - { name: "tagsTitle", label: "Tags Title", widget: "string" }
              - { name: "searchTitle", label: "Search Title", widget: "string" }
              - { name: "searchPlaceholder", label: "Search Placeholder", widget: "string" }
              - { name: "searchButton", label: "Search Button", widget: "string" }
          - { name: "body", label: "Fallback Body", widget: "markdown", required: false }

  - name: "portfolio"
    label: "Portfolio"
    editor:
      preview: false
    files:
      - name: "portfolio-page"
        label: "Portfolio Page"
        file: "content/portfolio/_index.md"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "description", label: "Description", widget: "text" }
          - { name: "type", label: "Type", widget: "hidden", default: "portfolio" }
          - { name: "draft", label: "Draft", widget: "boolean", default: false }
          - { name: "robotsNoIndex", label: "No Index", widget: "boolean", default: true }
          - { name: "outputs", label: "Outputs", widget: "hidden", default: ["HTML"] }
          - name: "sitemap"
            label: "Sitemap"
            widget: "object"
            collapsed: true
            fields:
              - { name: "disable", label: "Disable", widget: "boolean", default: true }
          - { name: "body", label: "Portfolio HTML Body", widget: "text", hint: "이 페이지는 섹션, 스타일, 스크립트가 함께 들어간 포트폴리오 본문입니다. HTML/JS 문자가 자동 변환되지 않도록 일반 텍스트 필드로 편집합니다." }

  - name: "work-log"
    label: "Work Log"
    folder: "content/blog/work-log"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} · {{date}} · {{draft}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "SEO Description", widget: "text", required: false, hint: "검색 결과와 SNS 미리보기에 쓰일 수 있는 80-160자 요약입니다." }
      - { name: "slug", label: "Slug", widget: "string" }
      - { name: "url", label: "Custom URL", widget: "string", required: false }
      - { name: "aliases", label: "Redirect Aliases", widget: "list", required: false }
      - { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "lastmod", label: "Last Modified", widget: "datetime", format: "YYYY-MM-DD", required: false }
      - { name: "draft", label: "Draft", widget: "boolean", default: true }
      - { name: "canonicalURL", label: "Canonical URL", widget: "string", required: false }
      - { name: "robotsNoIndex", label: "No Index", widget: "boolean", default: false, required: false }
      - { name: "type", label: "Type", widget: "hidden", default: "blog" }
      - { name: "categories", label: "Categories", widget: "hidden", default: ["work-log"] }
      - { name: "tags", label: "Tags", widget: "list", default: [] }
      - { name: "project", label: "Project", widget: "string", required: false }
      - { name: "workType", label: "Work Type", widget: "select", required: false, options: ["SEO", "Content", "Report", "Analytics", "Automation", "Meeting", "Operation"] }
      - name: "cover"
        label: "Cover Image"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { name: "image", label: "Image", widget: "image", required: false }
          - { name: "alt", label: "Alt Text", widget: "string", required: false }
          - { name: "relative", label: "Relative", widget: "boolean", default: false, required: false }
          - { name: "hidden", label: "Hide Cover", widget: "boolean", default: false, required: false }
          - { name: "hiddenInSingle", label: "Hide In Post", widget: "boolean", default: false, required: false }
          - { name: "hiddenInList", label: "Hide In List", widget: "boolean", default: false, required: false }
      - { name: "body", label: "Body", widget: "markdown" }

  - name: "seo-note"
    label: "SEO Note"
    folder: "content/blog/seo-note"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} · {{date}} · {{draft}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "SEO Description", widget: "text", required: false, hint: "검색 의도와 핵심 답변이 드러나는 80-160자 요약입니다." }
      - { name: "slug", label: "Slug", widget: "string" }
      - { name: "url", label: "Custom URL", widget: "string", required: false }
      - { name: "aliases", label: "Redirect Aliases", widget: "list", required: false }
      - { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "lastmod", label: "Last Modified", widget: "datetime", format: "YYYY-MM-DD", required: false }
      - { name: "draft", label: "Draft", widget: "boolean", default: true }
      - { name: "canonicalURL", label: "Canonical URL", widget: "string", required: false }
      - { name: "robotsNoIndex", label: "No Index", widget: "boolean", default: false, required: false }
      - { name: "type", label: "Type", widget: "hidden", default: "blog" }
      - { name: "categories", label: "Categories", widget: "hidden", default: ["seo-note"] }
      - { name: "tags", label: "Tags", widget: "list", default: [] }
      - { name: "searchIntent", label: "Search Intent", widget: "select", required: false, options: ["Informational", "Commercial", "Transactional", "Navigational"] }
      - { name: "targetKeyword", label: "Target Keyword", widget: "string", required: false }
      - name: "cover"
        label: "Cover Image"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { name: "image", label: "Image", widget: "image", required: false }
          - { name: "alt", label: "Alt Text", widget: "string", required: false }
          - { name: "relative", label: "Relative", widget: "boolean", default: false, required: false }
          - { name: "hidden", label: "Hide Cover", widget: "boolean", default: false, required: false }
          - { name: "hiddenInSingle", label: "Hide In Post", widget: "boolean", default: false, required: false }
          - { name: "hiddenInList", label: "Hide In List", widget: "boolean", default: false, required: false }
      - { name: "body", label: "Body", widget: "markdown" }

  - name: "aeo-geo-note"
    label: "AEO-GEO Note"
    folder: "content/blog/aeo-geo-note"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} · {{date}} · {{draft}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "SEO Description", widget: "text", required: false, hint: "AI 검색, Citation, FAQ, 구조화 데이터 관점의 핵심 요약입니다." }
      - { name: "slug", label: "Slug", widget: "string" }
      - { name: "url", label: "Custom URL", widget: "string", required: false }
      - { name: "aliases", label: "Redirect Aliases", widget: "list", required: false }
      - { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "lastmod", label: "Last Modified", widget: "datetime", format: "YYYY-MM-DD", required: false }
      - { name: "draft", label: "Draft", widget: "boolean", default: true }
      - { name: "canonicalURL", label: "Canonical URL", widget: "string", required: false }
      - { name: "robotsNoIndex", label: "No Index", widget: "boolean", default: false, required: false }
      - { name: "type", label: "Type", widget: "hidden", default: "blog" }
      - { name: "categories", label: "Categories", widget: "hidden", default: ["aeo-geo-note"] }
      - { name: "tags", label: "Tags", widget: "list", default: [] }
      - { name: "answerTarget", label: "Answer Target", widget: "string", required: false, hint: "이 글이 답하려는 대표 질문입니다." }
      - { name: "citationFocus", label: "Citation Focus", widget: "select", required: false, options: ["FAQ", "Structured Data", "Brand Mention", "External Trust", "AI Search", "Reporting"] }
      - name: "cover"
        label: "Cover Image"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { name: "image", label: "Image", widget: "image", required: false }
          - { name: "alt", label: "Alt Text", widget: "string", required: false }
          - { name: "relative", label: "Relative", widget: "boolean", default: false, required: false }
          - { name: "hidden", label: "Hide Cover", widget: "boolean", default: false, required: false }
          - { name: "hiddenInSingle", label: "Hide In Post", widget: "boolean", default: false, required: false }
          - { name: "hiddenInList", label: "Hide In List", widget: "boolean", default: false, required: false }
      - { name: "body", label: "Body", widget: "markdown" }
